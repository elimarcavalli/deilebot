personas:
  default_persona: developer
  enabled: true
  hot_reload: true
  persona_configs:
    architect:
      behavior_settings:
        focus_on_patterns: true
        include_trade_offs: true
        verbosity_level: comprehensive
      capabilities:
      - system_design
      - architecture_analysis
      - documentation
      - code_review
      - performance_optimization
      communication_style: strategic
      model_preferences:
        max_tokens: 8000
        temperature: 0.5
        top_p: 0.95
      tool_preferences:
        avoid_tools:
        - bash_tool
        preferred_tools:
        - search_tool
        - file_tools
        - analysis_tools
        tool_timeout: 60
    debugger:
      behavior_settings:
        ask_clarifying_questions: true
        step_by_step: true
        verbosity_level: focused
      capabilities:
      - debugging
      - error_analysis
      - performance_analysis
      - log_analysis
      - troubleshooting
      communication_style: analytical
      model_preferences:
        max_tokens: 5000
        temperature: 0.2
        top_p: 0.8
      tool_preferences:
        avoid_tools: []
        preferred_tools:
        - search_tool
        - file_tools
        - analysis_tools
        tool_timeout: 45
    developer:
      behavior_settings:
        code_explanation: true
        suggest_improvements: true
        verbosity_level: detailed
      capabilities:
      - code_generation
      - debugging
      - code_analysis
      - file_operations
      - git_operations
      communication_style: technical
      model_preferences:
        max_tokens: 6000
        temperature: 0.3
        top_p: 0.9
      tool_preferences:
        avoid_tools: []
        preferred_tools:
        - file_tools
        - git_tool
        - bash_tool
        tool_timeout: 30
  personas_directory: deile/personas/instructions
